<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-align: center;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-facil {
            background-color: #2ec4b6;
            color: #fff;
        }

        .btn-facil:hover {
            background-color: #20a396;
        }

        .btn-dificil {
            background-color: #e63946;
            color: #fff;
        }

        .btn-dificil:hover {
            background-color: #c81d25;
        }

        .btn-logout {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: #4a4e69;
            color: #fff;
            font-size: 0.9rem;
            padding: 0.7rem 1.2rem;
        }

        .btn-logout:hover {
            background-color: #35384e;
        }
    </style>
</head>
<body>

    <h1>Seleccioná la Dificultad</h1>

    <div class="menu-container">
        <button class="btn-facil" onclick="window.location.href='indexfacil.html'">Facil</button>
        <button    class="btn-dificil" onclick="window.location.href='indexdificil.html'">Dificil</button>
    </div>

    <button class="btn btn-logout" onclick="window.location.href='index.html'">Cerrar Sesión</button>

</body>
</html>
