<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golwordlle - Login</title>
    <style>
        h1 {
            text-align: center;
            color: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #444944;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .logo-img {
            display: block; 
            margin: 0 auto 20px auto; 
            max-width: 100%; 
            width: 400px; 
            height: auto;
        }
        .auth-container {
            background-color: #2d5333;
            max-width: 400px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
            text-align: center;
        }
        .form-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
        }
        .form-section:first-child {
            border-bottom: 2px dashed #e2e8f0;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ffffff;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 14px;
        }
        button, .btn-login-link {
            display: block;
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-registro { background-color: #28a745; }
        .btn-login-link { background-color: #007bff; }
    </style>
</head>
<body>

    <img src="img/logo.png" alt="Logo" class="logo-img">

    <div class="auth-container">
        
        <div class="form-section" id="registro-section">
            <h2>Registro</h2>
            <form id="form-registro">
                <div class="form-group">
                    <label for="reg-username">Username:</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña:</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="button" class="btn-registro" onclick="register()">Crear Cuenta</button>
            </form>
        </div>

        <div class="form-section" id="login-section">
            <h2>Inicio de Sesión</h2>
            <form id="form-login">
                <div class="form-group">
                    <label for="log-username">Username:</label>
                    <input type="text" id="log-username" required>
                </div>
                <div class="form-group">
                    <label for="log-password">Contraseña:</label>
                    <input type="password" id="log-password" required>
                </div>
                
                <a type="button" class="btn-login-link" onclick="login()">Iniciar Sesión</a>
            </form>
        </div>

    </div>

    <script src="logic.js"></script>
    <script src="dom.js"></script>

</body>
</html>
